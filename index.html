<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangyiquan Fa | Official Dossier</title>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Cinzel:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --red: #8b0000;
            --black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(197, 160, 89, 0.2);
        }

        body {
            background: var(--black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
        }

        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(139,0,0,0.1) 100%);
        }

        .hanzi-main {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 6rem;
            color: var(--gold);
            margin: 0;
            filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.4));
            animation: fadeIn 2s ease-in;
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 8px;
            margin-top: -20px;
            color: var(--gold);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Efeito Glassmorphism (Não é fatela) */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 2px;
            transition: 0.5s all cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--gold);
            background: rgba(139, 0, 0, 0.05);
            transform: translateY(-10px);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(197, 160, 89, 0.1), transparent);
            transition: 0.5s;
        }

        .card:hover::before { left: 100%; }

        .title-gold {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            border-left: 3px solid var(--red);
            padding-left: 15px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .btn-premium {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 25px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .card:hover .btn-premium {
            background: var(--gold);
            color: #000;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <section class="hero">
        <p class="hanzi-main">養意拳法</p>
        <h1>Yangyiquan Fa</h1>
        <p style="letter-spacing: 3px; opacity: 0.6;">THE FIST OF THE LIGHT'S INTENTION</p>
    </section>

    <div class="container">
        <h2 class="title-gold">Technical Literature</h2>
        <div class="grid">
            <a href="https://clubedeautores.pt/livro/vol-1-kung-fu-yangyiquan" target="_blank" class="card">
                <span style="color:var(--gold); font-weight:bold;">VOL I</span>
                <h3>Kung Fu Yangyiquan</h3>
                <p>O alicerce da intenção e o cultivo da luz interna.</p>
                <div class="btn-premium">Explore Library</div>
            </a>
            <!-- Repita para Vol 2 e 3 -->
        </div>

        <h2 class="title-gold" style="margin-top:80px;">Audiovisual Archives</h2>
        <div class="grid">
            <a href="https://youtu.be/aI7MKLiloQ8" target="_blank" class="card">
                <div style="font-size:2rem; margin-bottom:10px;">🛡️</div>
                <h3>Defensive Arsenal</h3>
                <p>Análise técnica de proteção e geometria marcial.</p>
                <div class="btn-premium">Watch Full Analysis</div>
            </a>
            <!-- Adicione os outros links aqui -->
        </div>
    </div>

</body>
</html>
